<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; padding: 20px; color: #333; }
        h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        ul { line-height: 1.8; }
    </style>
</head>
<body>
    <h2>说明</h2>
    <p>在安装之前，请确保您已经了解以下信息：</p>
    <ul>
        <li><strong>前置要求</strong>：本平台基于 Docker，必须先在系统中安装并运行 <a href="https://www.docker.com/products/docker-desktop" target="_blank">Docker Desktop</a>。</li>
        <li><strong>空间与内存</strong>：推荐预留至少 10GB 磁盘空间及 2GB 以上运行时内存。</li>
        <li><strong>端口映射</strong>：安装后将占用本地的 <code>8080</code> (Web UI), <code>1883</code> (MQTT) 端口，请确保这些端口未被占用。</li>
        <li><strong>数据存储</strong>：您的所有应用数据、设备配置和时序数据都将默认安全隔离并存储在本地。</li>
    </ul>
</body>
</html>
