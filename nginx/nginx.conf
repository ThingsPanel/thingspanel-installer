worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # 上游服务
    upstream backend {
        server backend:9999;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 8;
    }

    upstream thingsvis_server {
        server thingsvis-server:8000;
        keepalive 8;
    }

    upstream thingsvis_studio {
        server thingsvis-studio:3000;
        keepalive 8;
    }

    server {
        listen 8080;
        server_name _;

        client_max_body_size 100m;

        # ── 健康检查（供 Docker healthcheck 使用）───────────────────────────
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── 前端 SPA ─────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SPA fallback — 由 frontend 容器自身的 nginx 处理
        }

        # ── 后端 API ──────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
        }

        # ── 后端静态资源（文件上传下载等）────────────────────────────────
        location /files/ {
            proxy_pass http://backend/files/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── MQTT over WebSocket ───────────────────────────────────────────
        location /mqtt {
            proxy_pass http://gmqtt:1883/mqtt;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── ThingsVis Studio ─────────────────────────────────────────────
        location /thingsvis-studio/ {
            proxy_pass http://thingsvis_studio/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── ThingsVis Server ─────────────────────────────────────────────
        location /thingsvis/ {
            proxy_pass http://thingsvis_server/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
