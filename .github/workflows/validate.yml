name: Validate — PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'install.sh'
      - 'upgrade.sh'
      - 'uninstall.sh'
      - '*.bash'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          DATA_DIR=./data
          TZ=Asia/Shanghai
          EOF

      - name: Validate docker-compose syntax
        run: docker compose config --quiet

      - name: Validate nginx config syntax
        run: docker run --rm -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" nginx:alpine nginx -t

      - name: Lint shell scripts (shellcheck)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'install.sh upgrade.sh uninstall.sh install.bash'
