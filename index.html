<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download ThingsPanel</title>
    <!-- 使用 Tailwind CSS 加速美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .tab-btn { transition: all 0.2s ease; }
        .tab-btn.active { background-color: #f3f4f6; color: #111827; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-radius: 0.75rem; }
        .tab-btn:not(.active) { color: #6b7280; }
        .tab-btn:not(.active):hover { color: #111827; }
        
        .code-box { background-color: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.5rem; transition: border-color 0.2s ease; }
        .code-box:hover { border-color: #d1d5db; }
        
        .primary-btn { background-color: #1a1a1a; color: white; transition: background-color 0.2s ease; border-radius: 0.5rem; }
        .primary-btn:hover { background-color: #000000; }
    </style>
</head>
<body class="bg-white text-gray-900 font-sans antialiased min-h-screen flex flex-col items-center justify-center pt-10 pb-20">

    <div class="w-full max-w-4xl px-4 flex flex-col items-center">
        <!-- Logo 面包屑 -->
        <div class="flex items-center gap-3 mb-10">
            <svg class="w-8 h-8 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon>
                <line x1="12" y1="22" x2="12" y2="15.5"></line>
                <polyline points="22 8.5 12 15.5 2 8.5"></polyline>
                <polyline points="2 15.5 12 8.5 22 15.5"></polyline>
                <line x1="12" y1="2" x2="12" y2="8.5"></line>
            </svg>
            <span class="text-xl font-bold tracking-tight">ThingsPanel</span>
        </div>

        <h1 class="text-4xl md:text-5xl font-semibold tracking-tight text-center mb-16">Download ThingsPanel</h1>

        <!-- 平台选择 Tabs -->
        <div class="flex flex-wrap justify-center gap-2 md:gap-8 mb-16">
            <!-- macOS Tab -->
            <button onclick="switchTab('macos')" id="tab-macos" class="tab-btn w-32 h-32 flex flex-col items-center justify-center gap-3">
                <i class="fab fa-apple text-4xl"></i>
                <span class="text-lg font-medium">macOS</span>
            </button>
            
            <!-- Linux Tab -->
            <button onclick="switchTab('linux')" id="tab-linux" class="tab-btn active w-32 h-32 flex flex-col items-center justify-center gap-3">
                <i class="fab fa-linux text-4xl"></i>
                <span class="text-lg font-medium">Linux</span>
            </button>
            
            <!-- Windows Tab -->
            <button onclick="switchTab('windows')" id="tab-windows" class="tab-btn w-32 h-32 flex flex-col items-center justify-center gap-3">
                <i class="fab fa-windows text-4xl"></i>
                <span class="text-lg font-medium">Windows</span>
            </button>
        </div>

        <!-- 动态内容区域 -->
        <div class="w-full max-w-2xl text-center">
            
            <!-- 命令行框 -->
            <div class="code-box relative flex items-center justify-between p-4 mb-3">
                <code id="cmd-text" class="text-gray-800 font-mono text-base md:text-lg overflow-x-auto whitespace-nowrap text-left flex-grow mr-4">curl -fsSL https://install.thingspanel.io/install.sh | sh</code>
                <button onclick="copyCmd()" class="text-gray-400 hover:text-gray-700 transition flex-shrink-0 p-2">
                    <i id="copy-icon" class="far fa-copy text-xl"></i>
                </button>
            </div>
            
            <p id="cmd-hint" class="text-gray-500 mb-8">paste this in Terminal</p>

            <!-- 分割线 "or" (动态显示/隐藏) -->
            <div id="or-separator" class="flex items-center justify-center gap-4 mb-8">
                <div class="h-px bg-gray-200 flex-grow"></div>
                <span class="text-gray-400 font-medium px-2">or</span>
                <div class="h-px bg-gray-200 flex-grow"></div>
            </div>

            <!-- 图形安装包按钮 (动态显示/隐藏) -->
            <div id="gui-download-section" class="flex flex-col items-center">
                <a id="btn-download" href="https://github.com/ThingsPanel/thingspanel-installer/releases/latest" target="_blank" class="primary-btn w-full max-w-md py-4 px-6 text-xl font-medium inline-block shadow-sm">
                    Download for Linux
                </a>
                <p id="system-req" class="text-gray-500 mt-4 text-sm">Requires Docker Engine</p>
            </div>

        </div>

        <div class="mt-24 text-center text-sm text-gray-400">
            <a href="https://github.com/ThingsPanel/thingspanel-installer#readme" target="_blank" class="hover:text-gray-900 transition underline underline-offset-2">Documentation</a> &nbsp;·&nbsp; 
            <a href="https://github.com/ThingsPanel/thingspanel-installer/issues" target="_blank" class="hover:text-gray-900 transition underline underline-offset-2">Issues</a>
        </div>
    </div>

    <script>
        const platforms = {
            macos: {
                cmd: "curl -fsSL https://install.thingspanel.io/install.sh | sh",
                hint: "paste this in Terminal",
                btnText: "Download for macOS",
                req: "Requires Docker Desktop on Apple Silicon or Intel",
                showGui: true
            },
            linux: {
                cmd: "curl -fsSL https://install.thingspanel.io/install.sh | sh",
                hint: "paste this in Terminal",
                btnText: "",
                req: "",
                showGui: false
            },
            windows: {
                cmd: "irm https://install.thingspanel.io/install.ps1 | iex",
                hint: "paste this in PowerShell",
                btnText: "Download for Windows",
                req: "Requires Windows 10 or later with Docker Desktop",
                showGui: true
            }
        };

        let currentOs = 'linux';
        
        // 动态抓取 Release 链接
        let winUrl = 'https://github.com/ThingsPanel/thingspanel-installer/releases/latest';
        let macUrl = 'https://github.com/ThingsPanel/thingspanel-installer/releases/latest';

        async function fetchLatestRelease() {
            try {
                const response = await fetch('https://api.github.com/repos/ThingsPanel/thingspanel-installer/releases/latest');
                if (!response.ok) return;
                const data = await response.json();
                
                (data.assets || []).forEach(asset => {
                    if (asset.name.endsWith('.exe')) winUrl = asset.browser_download_url;
                    if (asset.name.endsWith('.pkg')) macUrl = asset.browser_download_url;
                });
                
                // 刷新当前按钮状态
                updateDownloadButton();
            } catch (err) {
                console.error("Failed to fetch release", err);
            }
        }

        function updateDownloadButton() {
            const btn = document.getElementById('btn-download');
            if (currentOs === 'windows') btn.href = winUrl;
            if (currentOs === 'macos') btn.href = macUrl;
        }

        function switchTab(os) {
            currentOs = os;
            
            // 更新 Tabs 样式
            ['macos', 'linux', 'windows'].forEach(p => {
                document.getElementById('tab-' + p).classList.remove('active');
            });
            document.getElementById('tab-' + os).classList.add('active');

            // 更新文本内容
            const config = platforms[os];
            document.getElementById('cmd-text').innerText = config.cmd;
            document.getElementById('cmd-hint').innerText = config.hint;
            
            // 切换 GUI 按钮
            const orSeparator = document.getElementById('or-separator');
            const guiSection = document.getElementById('gui-download-section');
            const btn = document.getElementById('btn-download');
            const req = document.getElementById('system-req');

            if (config.showGui) {
                orSeparator.style.display = 'flex';
                guiSection.style.display = 'flex';
                btn.innerText = config.btnText;
                req.innerText = config.req;
                updateDownloadButton();
            } else {
                orSeparator.style.display = 'none';
                guiSection.style.display = 'none';
            }
        }

        function copyCmd() {
            const text = document.getElementById('cmd-text').innerText;
            navigator.clipboard.writeText(text);
            
            const icon = document.getElementById('copy-icon');
            icon.className = 'fas fa-check text-green-500 text-xl';
            setTimeout(() => {
                icon.className = 'far fa-copy text-xl';
            }, 2000);
        }

        // 自动判定操作系统
        function detectOS() {
            const userAgent = window.navigator.userAgent;
            if (userAgent.indexOf("Win") !== -1) return "windows";
            if (userAgent.indexOf("Mac") !== -1) return "macos";
            return "linux";
        }

        // 初始化
        switchTab(detectOS());
        fetchLatestRelease();
    </script>
</body>
</html>
