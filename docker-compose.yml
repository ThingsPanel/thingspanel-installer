# ─────────────────────────────────────────────────────────────────────────────
# ThingsPanel All-in-One — docker-compose.yml
#
# 快速启动: curl -fsSL https://install.thingspanel.io/install.sh | sh
# 变量说明: 参考 .env.example
# ─────────────────────────────────────────────────────────────────────────────

name: thingspanel

services:

  # ── 数据库 (TimescaleDB) ────────────────────────────────────────────────────
  postgres:
    image: registry.cn-hangzhou.aliyuncs.com/thingspanel/timescaledb:${TP_TIMESCALEDB_VERSION:-14}
    container_name: tp-postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LC_ALL: C.UTF-8
      POSTGRES_DB: ThingsPanel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ThingsPanel"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - tp-net

  # ── 缓存 (Redis) ─────────────────────────────────────────────────────────────
  redis:
    image: registry.cn-hangzhou.aliyuncs.com/thingspanel/redis:${TP_REDIS_VERSION:-6.2.7}
    container_name: tp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - tp-net

  # ── MQTT Broker (GMQTT) ──────────────────────────────────────────────────────
  gmqtt:
    image: registry.cn-hangzhou.aliyuncs.com/thingspanel/thingspanel-gmqtt:${TP_GMQTT_VERSION:-v1.1.6}
    container_name: tp-gmqtt
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GMQTT_DB_REDIS_CONN: redis:6379
      GMQTT_DB_REDIS_PASSWORD: ${REDIS_PASSWORD}
      GMQTT_DB_PSQL_PSQLADDR: postgres
      GMQTT_DB_PSQL_PSQLPORT: "5432"
      GMQTT_DB_PSQL_PSQLDB: ThingsPanel
      GMQTT_DB_PSQL_PSQLUSER: postgres
      GMQTT_DB_PSQL_PSQLPASS: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/gmqtt:/gmqttd
    networks:
      - tp-net

  # ── 后端 API (ThingsPanel-Go) ─────────────────────────────────────────────────
  backend:
    image: registry.cn-hangzhou.aliyuncs.com/thingspanel/thingspanel-go:${TP_BACKEND_VERSION:-v1.1.13.6}
    container_name: tp-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gmqtt:
        condition: service_started
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GOTP_DB_PSQL_HOST: postgres
      GOTP_DB_PSQL_PORT: "5432"
      GOTP_DB_PSQL_USERNAME: postgres
      GOTP_DB_PSQL_PASSWORD: ${POSTGRES_PASSWORD}
      GOTP_DB_PSQL_DBNAME: ThingsPanel
      GOTP_DB_PSQL_LOG_LEVEL: "3"
      GOTP_DB_REDIS_ADDR: redis:6379
      GOTP_DB_REDIS_PASSWORD: ${REDIS_PASSWORD}
      GOTP_MQTT_SERVER: gmqtt
      GOTP_MQTT_ACCESS_ADDRESS: gmqtt:1883
      GOTP_MQTT_BROKER: gmqtt:1883
      GOTP_LOG_LEVEL: ${TP_LOG_LEVEL:-error}
    volumes:
      - ${DATA_DIR:-./data}/backend/files:/go/src/app/files
      - ${DATA_DIR:-./data}/backend/configs:/go/src/app/configs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - tp-net

  # ── Modbus 协议插件 ───────────────────────────────────────────────────────────
  modbus:
    image: registry.cn-hangzhou.aliyuncs.com/thingspanel/modbus-protocol-plugin:${TP_MODBUS_VERSION:-v1.0.6.1}
    container_name: tp-modbus
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MODBUS_THINGSPANEL_ADDRESS: http://backend:9999
      MODBUS_MQTT_BROKER: gmqtt:1883
      MODBUS_MQTT_QOS: "0"
      MODBUS_EXCEPTION_REPORT_ENABLED: "true"
    ports:
      - "${MODBUS_TCP_PORT:-502}:502"
      - "${MODBUS_RTU_PORT:-503}:503"
    networks:
      - tp-net

  # ── HTTP 协议适配器 ────────────────────────────────────────────────────────────
  http-adapter:
    image: registry.cn-hangzhou.aliyuncs.com/thingspanel/thingspanel-adapter-http:${TP_HTTP_ADAPTER_VERSION:-v1.0.0}
    container_name: tp-http-adapter
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      P_SERVER_PORT: "19090"
      P_SERVER_HTTP_PORT: "19091"
      P_PLATFORM_URL: http://backend:9999
      P_PLATFORM_MQTT_BROKER: tcp://gmqtt:1883
    networks:
      - tp-net

  # ── ThingsVis Server ──────────────────────────────────────────────────────────
  thingsvis-server:
    image: registry.cn-hangzhou.aliyuncs.com/thingspanel/thingsvis-server:${TP_THINGSVIS_SERVER_VERSION:-v1.0.4}
    container_name: tp-thingsvis-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/ThingsPanel?schema=thingsvis
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
    networks:
      - tp-net

  # ── ThingsVis Studio ──────────────────────────────────────────────────────────
  thingsvis-studio:
    image: registry.cn-hangzhou.aliyuncs.com/thingspanel/thingsvis-studio:${TP_THINGSVIS_STUDIO_VERSION:-v1.0.4}
    container_name: tp-thingsvis-studio
    restart: unless-stopped
    environment:
      STUDIO_PORT: "3000"
      SERVER_HOST: thingsvis-server
      SERVER_PORT: "8000"
    command: >
      /bin/sh -c "envsubst '$$STUDIO_PORT $$SERVER_HOST $$SERVER_PORT'
      < /etc/nginx/conf.d/default.conf.template
      > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - tp-net

  # ── 前端静态文件 (Vue SPA) ────────────────────────────────────────────────────
  frontend:
    image: registry.cn-hangzhou.aliyuncs.com/thingspanel/thingspanel-vue:${TP_VUE_VERSION:-v1.1.13.6}
    container_name: tp-frontend
    restart: unless-stopped
    networks:
      - tp-net

  # ── 网关 (Nginx 反向代理) ──────────────────────────────────────────────────────
  gateway:
    image: nginx:1.27-alpine
    container_name: tp-gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - tp-net

networks:
  tp-net:
    driver: bridge
    name: tp-net
