name: Validate — PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'docker-compose.yml'
      - 'niginx.conf'
      - 'install.sh'
      - 'install.ps1'
      - 'install.core.ps1'
      - 'upgrade.sh'
      - 'upgrade.ps1'
      - 'uninstall.sh'
      - 'uninstall.ps1'
      - '*.bash'
      - 'packaging/**'
      - '.github/workflows/validate.yml'
      - '.github/workflows/release.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          DATA_DIR=./data
          TZ=Asia/Shanghai
          EOF

      - name: Validate docker-compose syntax
        run: docker compose config --quiet

      - name: Validate nginx config syntax
        run: |
          if [ -f niginx.conf ]; then
            docker run --rm -v "$PWD/niginx.conf:/etc/nginx/nginx.conf:ro" nginx:alpine nginx -t
          fi

      - name: Lint shell scripts (shellcheck)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'install.sh upgrade.sh uninstall.sh install.bash'
